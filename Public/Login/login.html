<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Explore Devbhoomi | Login</title>

<link rel="stylesheet" href="loginstyle.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

</head>

<body>

<!-- head  -->
<div class="head">
    <h1>Explore <span>Devbhoomi</span></h1>
</div>

<!-- overall  -->
<div class="container">
    <!-- form box  -->
    <div class="form-box">
       
        <!-- toggle  -->
        <div class="toggle">
            <button id="loginBtn" class="active">Login</button>
            <button id="signupBtn">Sign Up</button>
        </div>

        <!-- login  -->
        <form id="loginForm" class="form active">
            <h2>Welcome Back</h2>
            <p>Plan your perfect Uttarakhand trip</p>

            <input type="email" placeholder="Email" required>
            <input type="password" placeholder="Password" required>

            <button type="submit" class="main-btn">Login</button>

            <span>Don't have an account? <a href="#" id="goSignup">Sign Up</a></span>
        </form>

        <!-- signup  -->
        <form id="signupForm" class="form">
            <h2>Create Account</h2>
            <p>Explore devBhoomi with us </p>

            <input type="text" placeholder="Full Name" required>
            <input type="email" placeholder="Email" required>
            <input type="password" placeholder="Password" required>

            <button type="submit" class="main-btn">Sign Up</button>

            <span>Already have an account? <a href="#" id="goLogin">Login</a></span>
        </form>

    </div>

</div>

<script src="loginscript.js"></script>

</body>
</html>
