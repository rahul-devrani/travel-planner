<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore Devbhoomi | Destination Details</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="detstyle.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
</head>
<body>

<nav class="navbar">
    <div class="navcont">
        <div class="logo">Explore Devbhoomi</div>
        <ul class="navlink">
            <li><a href="/Home/index.html">Home</a></li>
            <li><a href="/Destinations/destinations.html">Destinations</a></li>
            <li><a href="/Recommend/recommend.html">Get Recommendations</a></li>
            <li><a href="/Budget/budget.html">Budget Calculator</a></li>
        </ul>
        <div class="navrt">
          <button class="navlogin" id="navUserBtn">Login</button>
        </div>
    </div>
</nav>

<section class="hero">
    <img id="heroImg" alt="Destination Image">
    <div class="heroOver">
        <div class="heroBox">
            <span id="placeType"></span>
            <h1 id="placeName"></h1>
            <div class="rating">⭐ <span id="rating"></span></div>
        </div>
    </div>
</section>

<div class="main">
    <div class="left">
        <div class="card">
            <h2><span class="icon"></span> Overview</h2>
            <p id="descp" class="destext"></p>
        </div>

        <div class="card">
            <h2><span class="icon"></span> Top Attractions</h2>
            <div id="poiGrid" class="poiGrid"></div>
        </div>

        <div class="card rowflex">
            <div class="weather-section">
                <h3><span class="icon"></span> Weather Forecast</h3>
                <div id="weatherList" class="weag"></div>
            </div>

            <div class="map">
                <h3><span class="icon"></span> Location Map</h3>
                <div id="mapBox"></div>
            </div>
        </div>

        <div class="card">
            <h2><span class="icon"></span> Traveler Reviews</h2>
            <div id="reviewList" class="review"></div>
            <div class="reviews">
                <input id="reviewText" placeholder="Write your travel experience here...">
                <button onclick="submitReview()">Post Review</button>
            </div>
        </div>
    </div>

    <div class="right">
        <div class="card info">
            <h3>Trip Insights</h3>
            <div class="item">
                <span class="label">Best Time</span>
                <span id="bestTime" class="value"></span>
            </div>
            <div class="item">
                <span class="label">Category</span>
                <span id="placeType2" class="value"></span>
            </div>
        </div>

        <div class="actions">
            <button class="primbtn" onclick="goBudget()"> Budget Calculator</button>
            <button class="othbtn" onclick="goRecommend()"> Get Recommendation</button>
        </div>
    </div>
</div>

<footer class="footer">
    <p>© 2026 Explore Devbhoomi | Crafted by Team Ghumte Raho</p>
</footer>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="detscript.js"></script>

</body>
</html>
