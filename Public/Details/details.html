<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Explore Devbhoomi</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="detstyle.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

</head>

<body>

<!-- navbar  -->
 <nav class="navbar">
    <div class="nav-container">
        <div class="logo">Explore Devbhoomi</div>
        <ul class="nav-links">
            <li><a href="/Home/index.html">Home</a></li>
            <li><a href="/Destinations/destinations.html">Destinations</a></li>
            <li><a href="/Recommend/recommend.html">Get Recommendations</a></li>
            <li><a href="/Budget/budget.html">Budget Calculator</a></li>
        </ul>
        <div class="nav-right">
          <button class="nav-login-btn" id="navUserBtn">Login</button>
        </div>
    </div>
</nav>

<!-- hero  -->
<section class="hero">
    <img id="heroImg">
    <div class="heroOver">
        <div class="heroBox">
            <span id="placeType"></span>
            <h1 id="placeName"></h1>
            <div class="rating">⭐ <span id="rating"></span></div>
        </div>
    </div>
</section>

<div class="main">

    <!-- left  -->
    <div class="left">

        <div class="card">
            <h2>Overview</h2>
            <p id="descp"></p>
        </div>

        <div class="card">
            <h2>Top Attractions</h2>
            <div id="poiGrid" class="poiGrid"></div>
        </div>

        <!-- weather and map  -->
        <div class="card flex-row">

            <div>
                <h3>Weather</h3>
                <div id="weatherList" class="weather-grid"></div>
            </div>

            <div>
                <h3>Location</h3>
                <div id="mapBox"></div>
            </div>

        </div>

        <!-- reviews  -->
        <div class="card">
            <h2>Traveler Reviews</h2>

            <div id="reviewList"></div>

            <div class="review-form">
                <input id="reviewText" placeholder="Write review...">
                <button onclick="submitReview()">Submit</button>
            </div>
        </div>

    </div>

<!-- right  -->
    <div class="right">

        <div class="card">
            <h3>Trip Details</h3>
            <p><b>Best Time:</b> <span id="bestTime"></span></p>
            <p><b>Category:</b> <span id="placeType2"></span></p>
        </div>

        <div class="card actions">
            <button onclick="goBudget()"> Budget Calculator</button>
            <button onclick="goRecommend()"> Get Recommendation</button>
        </div>

    </div>

</div>

<footer class="footer">
    <p>Explore Devbhoomi || Team Ghumte Raho</p>
</footer>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="detscript.js"></script>

</body>
</html>
